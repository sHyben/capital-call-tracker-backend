server:
  port: 8080

spring:
  application:
    name: capital-call-tracker-backend
  datasource:
    url: jdbc:h2:mem:capitalcall;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
  messages:
    basename: messages
    encoding: UTF-8

# Entra ID app registration values — see README for how to obtain these.
# Left as placeholders so the app still boots locally before Entra ID is wired up
# (JWKS lookup happens lazily on first token validation, not at startup).
azure:
  tenant-id: ${AZURE_TENANT_ID:REPLACE-WITH-TENANT-ID}
  api-client-id: ${AZURE_API_CLIENT_ID:REPLACE-WITH-API-CLIENT-ID}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
