server:
  port: 8080

spring:
  application:
    name: capital-call-tracker-backend
  datasource:
    url: ${DB_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
  messages:
    basename: messages
    encoding: UTF-8

# Entra ID app registration values — see README for how to obtain these.
# Left as placeholders so the app still boots locally before Entra ID is wired up
# (JWKS lookup happens lazily on first token validation, not at startup).
azure:
  tenant-id: ${AZURE_TENANT_ID:REPLACE-WITH-TENANT-ID}
  api-client-id: ${AZURE_API_CLIENT_ID:REPLACE-WITH-API-CLIENT-ID}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
